name: Deploy Laravel to Server
on:
  push:
    branches:
      - main
env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Descargar el código del repositorio
        uses: actions/checkout@v4
      - name: Iniciar sesión en GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Extraer metadatos y etiquetas para Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Instalar dependencias NPM y compilar Vite
        run: |
          npm install
          npm run build
      - name: Construir y subir la imagen (Build & Push)
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
  deploy:
    needs: build-and-push 
    runs-on: ubuntu-latest
    steps:
      - name: Conectar al servidor vía SSH y actualizar contenedores
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            cd /opt/mass
            echo "${{ secrets.GHCR_PAT }}" | docker login ghcr.io -u mcastillocho --password-stdin
            docker compose pull mass_php_app
            docker compose down
            docker volume rm -f mass_app_code
            docker compose up -d
            docker image prune -f
            docker exec mass_php php artisan migrate --force
            docker exec mass_php php artisan optimize:clear